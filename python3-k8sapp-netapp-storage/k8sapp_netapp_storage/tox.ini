[tox]
envlist = flake8,py39,pylint,metadata,bandit
minversion = 1.6

# tox does not work if the path is too long, so move it to /tmp
toxworkdir = /tmp/{env:USER}_k8snetapptox
stxdir = {toxinidir}/../../..
distshare={toxworkdir}/.tox/distshare

[testenv]
basepython = python3.9

allowlist_externals = bash
                      find
                      echo

install_command = pip install -v -v -v \
    -c{env:UPPER_CONSTRAINTS_FILE:https://opendev.org/starlingx/root/raw/branch/master/build-tools/requirements/debian/upper-constraints.txt} \
    {opts} {packages}

setenv = VIRTUAL_ENV={envdir}
         PYTHONHASHSEED=0
         PIP_RESOLVER_DEBUG=1
         PYTHONDONTWRITEBYTECODE=1
         OS_TEST_PATH=./k8sapp_netapp_storage/tests
         LANG=en_US.UTF-8
         LANGUAGE=en_US:en
         LC_ALL=C
         SYSINV_TEST_ENV=True
         TOX_WORK_DIR={toxworkdir}
         PYLINTHOME={toxworkdir}

deps = -r{toxinidir}/requirements.txt
       -r{toxinidir}/test-requirements.txt
         {[tox]stxdir}/config/sysinv/sysinv/sysinv
       -e{[tox]stxdir}/config/tsconfig/tsconfig
       -e{[tox]stxdir}/fault/fm-api/source
       -e{[tox]stxdir}/fault/python-fmclient/fmclient

commands =
  find . -type f -name "*.pyc" -delete

[flake8]
ignore = H101,H102,H104,H105,H306,H401,H403,H404,H405,H701,H702,H703,
         B006,B007,B009,B010,B012,B014,B301
         W503,W504,W605,
         E117,E126,E127,E128,E402,E741
exclude = build,dist,tools,.eggs
max-line-length=120

[testenv:flake8]
deps = -r{toxinidir}/test-requirements.txt
commands =
  flake8 {posargs} ./k8sapp_netapp_storage

[testenv:py39]
commands =
  stestr run {posargs}
  stestr slowest

[testenv:pep8]
deps = -r{toxinidir}/test-requirements.txt
commands = {[testenv:flake8]commands}

[testenv:venv]
commands = {posargs}

[bandit]
skips = B101,B103,B104,B105,B108,B110,B303,B307,B310,B311,B314,B318,B320,B404,B405,B408,B410,B506,B602,B603,B604,B605,B607,B608
exclude = tests

[testenv:bandit]
deps = -r{toxinidir}/test-requirements.txt
commands = bandit --ini tox.ini -n 5 -r k8sapp_netapp_storage

[testenv:pylint]
install_command = pip install -v -v -v \
    -c{env:UPPER_CONSTRAINTS_FILE:https://opendev.org/starlingx/root/raw/branch/master/build-tools/requirements/debian/upper-constraints.txt} \
    {opts} {packages}
commands =
     pylint {posargs} k8sapp_netapp_storage --rcfile=./pylint.rc

[testenv:cover]
passenv = CURL_CA_BUNDLE
deps = {[testenv]deps}
setenv = {[testenv]setenv}
         PYTHON=coverage run --parallel-mode

commands =
  {[testenv]commands}
   coverage erase
   stestr run {posargs}
   coverage combine
   coverage html -d cover
   coverage xml -o cover/coverage.xml
   coverage report

[testenv:metadata]
install_command = pip install -v -v -v \
    -c{env:UPPER_CONSTRAINTS_FILE:https://opendev.org/starlingx/root/raw/branch/master/build-tools/requirements/debian/upper-constraints.txt} \
    {opts} {packages}
commands =
  bash -c "echo $(dirname $(dirname $(pwd))) | xargs -n 1 sysinv-app tox"
