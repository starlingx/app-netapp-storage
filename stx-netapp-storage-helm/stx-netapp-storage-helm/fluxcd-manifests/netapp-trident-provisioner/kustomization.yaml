---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: trident
resources:
  - helmrelease.yaml
secretGenerator:
  - name: netapp-trident-provisioner-static-overrides
    files:
      - netapp-trident-provisioner-static-overrides.yaml
  - name: netapp-trident-provisioner-system-overrides
    files:
      - netapp-trident-provisioner-system-overrides.yaml
generatorOptions:
  disableNameSuffixHash: true
